<link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="menu">
            <div class="logo-title">
                <a href="../index.html">
                    <img class="logo" src="../../images/logo.png" alt="logo d'Overburnt avec un joyeux ordinateur prêt à en découdre avec plaisir pour toujours plus de productivité !"/>
                </a>
                <h1 class="brand-title">Overburnt™</h1>
            </div>
                
            <div class="main-menu">
                <a href="produits.html">
                    Produits
                </a>
                <a href="lifestyle.html">
                    Lifestyle
                </a>
                <a href="marque.html">
                    À propos
                </a>
            </div>

            <div class="client-menu">
                <a href="favoris.html">
                    <img class="icon" src="../../images/icons/icon_favorite_empty.png" alt="hearts">
                </a>

                <a href="compte.html">
                    <img class="icon" src="../../images/icons/icon_not_connected.png" alt="face-with-rolling-eyes-icon">

                    <span id="cart-count">0</span>
                    <img class="icon" src="../../images/icons/icon_cart_empty.png" alt="shopping-cart">
                </a>
            </div>


        </nav>
    </header>

    <main>
        <section class="admin-section">
            <h1>Gestion des produits</h1>

            <div class="admin-form-block">
            <h2 id="form-title">Ajouter un produit</h2>
            <form id="form-produit" enctype="multipart/form-data">
                <input type="hidden"  id="product-id" />
                <input type="text"    id="name"        placeholder="Nom"         required />
                <input type="text"    id="slug"        placeholder="Slug"        />
                <input type="text"    id="category"    placeholder="Catégorie"   />
                <input type="number" id="price"    step="0.01" min="0.01" placeholder="Prix" required />
                <input type="number" id="taux_tva" step="0.01" min="0"  placeholder="TVA"  required />
                <input type="number" id="stock"    min="0" placeholder="Stock"required />
                <textarea             id="description" placeholder="Description"></textarea>
                <input type="file"    id="image"       accept="image/*" />
                <div id="image-preview"></div>
                <button type="submit" id="btn-submit">Ajouter</button>
                <button type="button" id="btn-cancel" style="display:none">Annuler</button>
                <p id="form-message"></p>
            </form>
            </div>

            <div class="admin-list-block">
            <h2>Produits existants</h2>
            <p id="products-loading">Chargement...</p>
            <div id="products-list"></div>
            </div>
        </section>
    </main>
    
    <footer>
        <img id="footer-logo" src="../../images/logo_transparent.png" alt="">
        <p>Quand on touche le fond, on ne peut que remonter ! 🤓</p>

            <div class="footer-column">
                <a href="../pages/produits.html">Produits</a>
                <a href="../pages/lifestyle.html">Lifestyle</a>
                <a href="../pages/marque.html">À propos</a>
            </div>
        </div>

    </footer>

    <script src="../../js/api.js"></script>
    <script src="../../js/panier.js"></script>
    <script src="../../js/admin-produits.js"></script>
    <!-- <script src="../../js/cursor.js"></script> -->
</body>
