   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chango&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

<body>

        <header>
        <nav class="menu">
            <div class="logo-title">
                <a href="index.html">
                    <img class="logo" src="../images/logo.png" alt="logo d'Overburnt avec un joyeux ordinateur prêt à en découdre avec plaisir pour toujours plus de productivité !"/>
                </a>
                <h1 class="brand-title">Overburnt™</h1>
            </div>

            <button id="burger-toggle" class="burger-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div id="mobile-nav-panel" class="mobile-nav-panel">
                <div class="main-menu">
                    <a href="produits.html">
                        Produits
                    </a>
                    <a href="lifestyle.html">
                        Lifestyle
                    </a>
                    <a href="marque.html">
                        À propos
                    </a>
                </div>

                <div class="client-menu">
                    <a href="connexion.html" id="nav-account-link" class="nav-icon-link">
                        <img id="nav-account-icon" class="icon" src="../images/icons/icon_not_connected.png" alt="compte" />
                        <span class="icon-label" id="nav-account-label">Connexion</span>
                    </a>

                    <a href="favoris.html" id="nav-favorite-link" class="nav-icon-link">
                        <img id="nav-favorite-icon" class="icon" src="../images/icons/icon_favorite_empty.png" alt="favoris" />
                        <span class="icon-label">Favoris</span>
                    </a>

                    <a href="panier.html" id="nav-cart-link" class="nav-icon-link">
                        <div class="icon-wrapper">
                            <img id="nav-cart-icon" class="icon" src="../images/icons/icon_cart_empty.png" alt="panier" />
                            <span id="cart-count" class="cart-badge">0</span>
                        </div>
                        <span class="icon-label">Panier</span>
                    </a>
                </div>
            </div>

            <div id="menu-overlay" class="menu-overlay"></div>

        </nav>
        <nav id="admin-menu" style="display:none">
            <a href="admin/produits.html">Produits</a>
            <a href="admin/commandes.html">Commandes</a>
            <a href="admin/utilisateurs.html">Utilisateurs</a>
        </nav>
    </header>

    <main>
    <section class="checkout-section">
        <h1>Finaliser la commande</h1>
        <div class="checkout-layout">

        <div class="checkout-form-block">
            <h2>Adresse de livraison</h2>
            <form id="form-checkout">
            <input type="text"  id="name"        placeholder="Nom"        required />
            <input type="text"  id="surname"     placeholder="Prénom"     required />
            <input type="text"  id="street"      placeholder="Rue"        required />
            <input type="text"  id="city"        placeholder="Ville"      required />
            <input type="text"  id="postal_code" placeholder="Code postal" required />
            <input type="text"  id="country"     placeholder="Pays"       required />
            <input type="tel"   id="phone"       placeholder="Téléphone (optionnel)" />
            <button type="submit" id="btn-pay">Payer</button>
            <p id="error-message"></p>
            </form>
        </div>

        <aside class="checkout-summary">
            <h2>Récapitulatif</h2>
            <div id="checkout-items"></div>
            <hr />
            <p>Total HT : <span id="summary-ht"></span> €</p>
            <p>TVA : <span id="summary-tva"></span> €</p>
            <p class="summary-ttc">Total TTC : <span id="summary-ttc"></span> €</p>
        </aside>

        </div>
    </section>
    </main>
    
<footer>
        <img id="footer-logo" src="../images/logo_transparent.png" alt="">
        <p>Quand on touche le fond, on ne peut que remonter ! 🤓</p>
        <div id="footer-links">

            </div>
            <div class="footer-column">

                <a href="lifestyle.html">Lifestyle</a>
                <a href="marque.html">À propos</a>
            </div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/panier.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/checkout.js"></script>
    <script src="../js/cursor.js"></script>
</body>
</html>
